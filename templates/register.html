<h1>Register</h1>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

{% if message %}
<p>{{ message }}</p>
{% endif %}
