<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — AI Sales Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="admin-layout">

    <!-- ── Sidebar ── -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand">🛠️ Admin Panel</div>
        <div class="sidebar-user">{{ session.get('email', 'admin') }}</div>

        <nav class="sidebar-nav">
            <a href="/admin"          class="{{ 'active' if active == 'overview'  }}">📊 Overview</a>
            <a href="/admin/products" class="{{ 'active' if active == 'products'  }}">📦 Products</a>
            <a href="/admin/chats"    class="{{ 'active' if active == 'chats'     }}">💬 Chat History</a>
            <a href="/admin/buyers"   class="{{ 'active' if active == 'buyers'    }}">👥 Buyers</a>
        </nav>

        <div class="sidebar-footer">
            <a href="/logout" class="btn btn-outline-danger btn-sm w-100">Logout</a>
        </div>
    </aside>

    <!-- ── Main content ── -->
    <main class="admin-main">
        {% block content %}{% endblock %}
    </main>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
