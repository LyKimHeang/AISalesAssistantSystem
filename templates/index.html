<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sales Assistant</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }

        .chat-box {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .bubble-user {
            background: #e9ecef;
            border-radius: 16px 16px 4px 16px;
            padding: 12px 16px;
            display: inline-block;
            max-width: 85%;
        }

        .bubble-ai {
            background: #0d6efd;
            color: #fff;
            border-radius: 16px 16px 16px 4px;
            padding: 12px 16px;
            display: inline-block;
            max-width: 85%;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <!-- Header -->
            <div class="text-center mb-4">
                <h2 class="fw-bold">🤖 AI Sales Assistant</h2>
                <p class="text-muted">Ask me anything about our products!</p>
            </div>

            <!-- Chat display (shows after a question is asked) -->
            {% if user_question %}
            <div class="chat-box mb-4">

                <!-- Customer bubble -->
                <div class="d-flex justify-content-end mb-3">
                    <div>
                        <small class="text-muted d-block text-end mb-1">You</small>
                        <span class="bubble-user">{{ user_question }}</span>
                    </div>
                </div>

                <!-- AI bubble -->
                <div class="d-flex justify-content-start">
                    <div>
                        <small class="text-muted d-block mb-1">🤖 Assistant</small>
                        <span class="bubble-ai">{{ ai_response }}</span>
                    </div>
                </div>

            </div>
            {% endif %}

            <!-- Input form -->
            <div class="chat-box">
                <form method="POST">
                    <label class="form-label fw-semibold">Ask about a product:</label>
                    <div class="input-group">
                        <input
                            type="text"
                            name="product"
                            class="form-control form-control-lg"
                            placeholder="e.g. Do you have iPhone 15 in stock?"
                            value="{{ user_question or '' }}"
                            required
                            autofocus>
                        <button class="btn btn-primary btn-lg" type="submit">Ask</button>
                    </div>
                </form>
            </div>

            <!-- Footer link -->
            <div class="text-center mt-3">
                <a href="/login" class="text-muted small">Admin / Staff Login</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
