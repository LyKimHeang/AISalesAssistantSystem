<!DOCTYPE html>
<html>
<head>
    <title>AI Sales Assistant</title>
</head>
<body>

    <h1>AI Sales Assistant</h1>

    <form method="POST">

        <label>Product Name:</label><br>
        <input type="text" name="product"><br><br>

        <button type="submit">Check Product</button>

    </form>

    <hr>

    <h2>Add Product (Admin)</h2>

    <form method="POST" action="/add">

        <input type="text" name="name" placeholder="Product Name" required><br><br>

        <input type="number" name="stock" placeholder="Stock" required><br><br>

        <input type="number" name="price" placeholder="Price" required><br><br>

        <button type="submit">Add Product</button>

    </form>

    <hr>

    {% if message %}
        <h3>{{ message }}</h3>
    {% endif %}

    {% if result %}

        <h2>Product Found</h2>

        <p>ID: {{ result[0] }}</p>
        <p>Name: {{ result[1] }}</p>
        <p>Stock: {{ result[2] }}</p>
        <p>Price: ${{ result[3] }}</p>

    {% endif %}

</body>
</html>
